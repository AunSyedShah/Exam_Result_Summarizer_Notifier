{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 mx-auto text-center">
            <h1 class="display-1">404</h1>
            <h2 class="mb-4">{{ message or 'Page Not Found' }}</h2>
            <p class="text-muted mb-4">The page you're looking for doesn't exist or has been deleted.</p>
            <a href="{{ url_for('dashboard.dashboard') }}" class="btn btn-primary btn-lg">← Back to Dashboard</a>
        </div>
    </div>
</div>
{% endblock %}
